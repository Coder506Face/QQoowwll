<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QOWL Mini</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #e0e0e0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .container { max-width: 400px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
    h1 { font-size: 22px; margin-bottom: 4px; color: var(--tg-theme-text-color, #fff); }
    .subtitle { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 20px; }
    .card {
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 14px; padding: 20px; margin-bottom: 12px;
    }
    .card h2 { font-size: 16px; margin-bottom: 10px; }
    .card p { font-size: 13px; color: var(--tg-theme-hint-color, #999); margin-bottom: 14px; line-height: 1.5; }
    .btn {
      display: block; width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center; margin-bottom: 8px;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--tg-theme-button-color, #c9a84c); color: var(--tg-theme-button-text-color, #000); }
    .btn-success { background: #22c55e; color: #fff; }

    .status-box {
      margin-top: 8px; padding: 10px; border-radius: 10px;
      font-size: 13px; text-align: center; display: none;
    }
    .status-box.show { display: block; }
    .status-box.good { background: rgba(34,197,94,0.15); color: #22c55e; }
    .status-box.bad { background: rgba(239,68,68,0.15); color: #ef4444; }
    .status-box.info { background: rgba(96,165,250,0.15); color: #60a5fa; }

    input {
      width: 100%; padding: 10px; border-radius: 10px;
      border: 1px solid var(--tg-theme-hint-color, #333);
      background: var(--tg-theme-secondary-bg-color, #16213e);
      color: var(--tg-theme-text-color, #e0e0e0);
      font-size: 14px; font-family: inherit; margin-bottom: 8px; outline: none;
    }
    .footer { margin-top: 10px; text-align: center; font-size: 11px; color: var(--tg-theme-hint-color, #555); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 QOWL Mini</h1>
    <p class="subtitle">Мини-приложение QOWL Bot</p>

    <div id="statusInit" class="status-box info show">⏳ Загрузка...</div>

    <div class="card">
      <h2>👋 Привет</h2>
      <p>Отправить приветствие в чат с ботом.</p>
      <button class="btn btn-primary" onclick="sendHello()">👋 Сказать «Привет!»</button>
    </div>

    <div class="card">
      <h2>📝 Свой текст</h2>
      <p>Напиши что-нибудь и отправь боту.</p>
      <input id="customText" placeholder="Введите текст...">
      <button class="btn btn-success" onclick="sendText()">📤 Отправить</button>
    </div>

    <div class="card">
      <h2>💡 Как это работает</h2>
      <p style="font-size:12px">
        Нажми кнопку → откроется чат с ботом → нажми <b>Start</b> или
        отправь сообщение. Бот ответит в чате.
      </p>
    </div>

    <div id="statusMsg" class="status-box"></div>
    <div class="footer">QOWL Bot — Mini App</div>
  </div>

  <script>
    var BOT_USERNAME = 'qowlc_bot';

    function showStatus(text, type) {
      var el = document.getElementById('statusMsg');
      el.textContent = text;
      el.className = 'status-box show ' + type;
    }

    function init() {
      var statusInit = document.getElementById('statusInit');
      var hasTg = false;
      try {
        hasTg = window.Telegram && window.Telegram.WebApp ? true : false;
      } catch(e) {}

      if (hasTg) {
        var tg = window.Telegram.WebApp;
        tg.ready();
        var user = tg.initDataUnsafe && tg.initDataUnsafe.user;
        if (user) {
          statusInit.className = 'status-box show good';
          statusInit.textContent = '✅ В Telegram как ' + user.first_name;
        } else {
          statusInit.className = 'status-box show info';
          statusInit.textContent = '⚡ Открыто через Telegram';
        }
      } else {
        statusInit.className = 'status-box show info';
        statusInit.textContent = '💡 Работает и в браузере';
      }
    }

    function openBotChat(startParam) {
      var url = 'https://t.me/' + BOT_USERNAME + '?start=' + startParam;

      var tg = null;
      try { tg = window.Telegram && window.Telegram.WebApp; } catch(e) {}

      if (tg && tg.openTelegramLink) {
        tg.openTelegramLink(url);
      } else {
        window.open(url, '_blank');
      }
    }

    function sendHello() {
      openBotChat('app_hello');
      showStatus('✅ Открываю чат. Нажми Start/Отправить.', 'good');
    }

    function sendText() {
      var input = document.getElementById('customText');
      var text = input.value.trim();
      if (!text) {
        showStatus('❌ Введите текст', 'bad');
        return;
      }

      // Store text, send only first letter as ID (start param limit)
      // The bot handler will prompt for the text separately
      openBotChat('app_hello');
      showStatus('✅ Открой чат и отправь это сообщение боту:\n' + text, 'info');
      input.value = '';
    }
  </script>
</body>
</html>
