<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QOWL Mini</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #e0e0e0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      width: 100%;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 4px;
      color: var(--tg-theme-text-color, #fff);
    }
    .subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-bottom: 20px;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 16px;
      margin-bottom: 10px;
    }
    .card p {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      margin-bottom: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--tg-theme-button-color, #c9a84c);
      color: var(--tg-theme-button-text-color, #000);
    }
    .btn-secondary {
      background: var(--tg-theme-secondary-bg-color, #2a2a4a);
      color: var(--tg-theme-text-color, #ccc);
      border: 1px solid var(--tg-theme-hint-color, #333);
    }
    .btn-success {
      background: #22c55e;
      color: #fff;
    }
    #status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    #status.show { display: block; }
    #status.success { background: rgba(34,197,94,0.15); color: #22c55e; }
    #status.error { background: rgba(239,68,68,0.15); color: #ef4444; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--tg-theme-button-color, #c9a84c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #000;
    }
    .footer {
      margin-top: auto;
      padding-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--tg-theme-hint-color, #555);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="user-info" id="userInfo" style="display:none">
      <div class="user-avatar" id="userAvatar">?</div>
      <div>
        <div id="userName" style="font-weight:600;font-size:14px"></div>
        <div id="userId" style="font-size:12px;color:var(--tg-theme-hint-color,#888)"></div>
      </div>
    </div>

    <h1>🎮 QOWL Mini</h1>
    <p class="subtitle">Мини-приложение QOWL Bot</p>

    <div class="card">
      <h2>📨 Тест отправки</h2>
      <p>Нажми кнопку, чтобы отправить сообщение в чат с ботом.</p>
      <button class="btn btn-primary" onclick="sendTest()">📩 Отправить тест</button>
    </div>

    <div class="card">
      <h2>📝 Свой текст</h2>
      <p>Напиши что-нибудь и отправь в чат.</p>
      <input id="customText" type="text" placeholder="Введите текст..." style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--tg-theme-hint-color,#333);background:var(--tg-theme-secondary-bg-color,#16213e);color:var(--tg-theme-text-color,#e0e0e0);font-size:14px;font-family:inherit;margin-bottom:8px;outline:none">
      <button class="btn btn-secondary" onclick="sendCustom()">📤 Отправить текст</button>
    </div>

    <div id="status"></div>
    <div class="footer">QOWL Bot — Mini App</div>
  </div>

  <script>
    let tg = null;

    function init() {
      try {
        tg = window.Telegram && window.Telegram.WebApp;
        if (tg) {
          tg.ready();
          tg.expand();

          // Display user info
          var user = tg.initDataUnsafe && tg.initDataUnsafe.user;
          if (user) {
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userId').textContent = '@' + (user.username || 'id' + user.id);
            document.getElementById('userAvatar').textContent = (user.first_name || '?')[0].toUpperCase();
          }
        } else {
          showStatus('❌ Запустите через Telegram', 'error');
        }
      } catch(e) {
        showStatus('❌ Ошибка: ' + e.message, 'error');
      }
    }

    function showStatus(text, type) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'show ' + type;
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    function sendTest() {
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'test', message: 'Привет из мини-приложения! 🎉' }));
        showStatus('✅ Отправлено!', 'success');
      } else {
        showStatus('❌ Запустите через Telegram', 'error');
      }
    }

    function sendCustom() {
      const input = document.getElementById('customText');
      const text = input.value.trim();
      if (!text) {
        showStatus('❌ Введите текст', 'error');
        return;
      }
      if (tg) {
        tg.sendData(JSON.stringify({ action: 'test', message: text }));
        input.value = '';
        showStatus('✅ Отправлено!', 'success');
      } else {
        showStatus('❌ Запустите через Telegram', 'error');
      }
    }

    init();
  </script>
</body>
</html>
